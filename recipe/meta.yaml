{% set version = "3.1.0" %}

package:
  name: binwalk
  version: {{ version }}

source:
  # pypi version is... very old
  url: https://github.com/ReFirmLabs/binwalk/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 06f595719417b70a592580258ed980237892eadc198e02363201abe6ca59e49a
  patches:
    - 0000-setup-py-version.diff
    - 0001-extractor-is-zero.diff

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  entry_points:
    - binwalk = binwalk.__main__:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  source_files:
    - testing/tests
  requires:
    - m2-grep  # [win]
    - nose
    - pip
    - pytest-cov
    - python {{ python_min }}
  imports:
    - binwalk
  commands:
    - pip check
    - binwalk --help
    - binwalk --help | grep -iE "Binwalk v{{ version.replace('.', '\.') }}"
    - cd testing/tests && pytest -vv --cov=binwalk --cov=branch --cov-report=term-missing:skip-covered -k "not firmware_zip" --cov-fail-under=57

about:
  home: https://github.com/ReFirmLabs/binwalk
  summary: Firmware analysis tool
  license: MIT
  license_file:
    - LICENSE
    - NOTICE.md
  doc_url: https://github.com/ReFirmLabs/binwalk/wiki

extra:
  recipe-maintainers:
    - bollwyvl
